<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Filter Funnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        .filters {
            display: flex;
            gap: 12px;
            height: 40px;
            align-items: center;
            min-width: 300px;
        }

        .filter-tag {
            background: #0d9488;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            animation: slideInTag 0.5s ease forwards;
        }

        .filter-tag:nth-child(1) {
            animation-delay: 1s;
        }

        .filter-tag:nth-child(2) {
            animation-delay: 1.6s;
        }

        @keyframes slideInTag {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tutors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            position: relative;
        }

        .tutor-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .tutor-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            transition: all 0.6s ease;
        }

        .tutor-name {
            font-size: 12px;
            color: #666;
            font-weight: 500;
            text-align: center;
        }

        /* Filter animations */
        .tutor-item:nth-child(1) .tutor-photo,
        .tutor-item:nth-child(2) .tutor-photo,
        .tutor-item:nth-child(5) .tutor-photo,
        .tutor-item:nth-child(6) .tutor-photo {
            animation: filterOut 0.6s ease forwards;
            animation-delay: 1.6s;
        }

        .tutor-item:nth-child(2) .tutor-photo,
        .tutor-item:nth-child(6) .tutor-photo {
            animation: none !important;
            opacity: 0.15;
            transform: scale(0.85);
        }

        .tutor-item:nth-child(2) {
            animation: highlightMatch 0.6s ease forwards;
            animation-delay: 1.6s;
        }

        .tutor-item:nth-child(5) {
            animation: highlightMatch 0.6s ease forwards;
            animation-delay: 1.6s;
        }

        @keyframes filterOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0.15;
                transform: scale(0.85);
            }
        }

        @keyframes highlightMatch {
            0% {
                transform: scale(1);
                filter: drop-shadow(none);
            }
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(13, 148, 136, 0.5));
            }
        }

        /* Reset animation loop */
        .tutor-item {
            animation: resetTutors 4s ease-in-out infinite;
        }

        @keyframes resetTutors {
            0%, 100% {
                opacity: 1;
            }
        }

        .tutor-item:nth-child(1) .tutor-photo,
        .tutor-item:nth-child(3) .tutor-photo,
        .tutor-item:nth-child(4) .tutor-photo,
        .tutor-item:nth-child(6) .tutor-photo {
            animation: fullFilterCycle 4s ease-in-out infinite !important;
        }

        .tutor-item:nth-child(2) .tutor-photo,
        .tutor-item:nth-child(5) .tutor-photo {
            animation: matchCycle 4s ease-in-out infinite !important;
        }

        @keyframes fullFilterCycle {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(none);
            }
            40% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(none);
            }
            60% {
                opacity: 0.15;
                transform: scale(0.85);
                filter: drop-shadow(none);
            }
        }

        @keyframes matchCycle {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(none);
            }
            40% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(none);
            }
            60% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(13, 148, 136, 0.5));
            }
        }

        /* Cursor styling */
        .cursor {
            position: fixed;
            width: 48px;
            height: 48px;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
    </style>
</head>
<body>
    <div class="cursor">
        <svg viewBox="0 0 24 24" fill="white" stroke="#222" stroke-width="1.2">
            <path d="M4 2l16 10-7 1-4 7z"/>
        </svg>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-tag">Oxford</div>
            <div class="filter-tag">Personal Statement</div>
        </div>

        <div class="tutors-grid">
            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/233eec2a-5857-42bd-ae1b-26666175b68e/bbbcf803-f809-4899-b652-8b8e579982a4.jpeg" alt="Scott Hong" class="tutor-photo">
                <div class="tutor-name">Scott Hong</div>
            </div>

            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/f223d50a-498c-4c7c-b740-052463f673aa/141176b4-f633-4d68-af69-4ae479428cc9.jpg" alt="Jin Ming Ooi" class="tutor-photo">
                <div class="tutor-name">Jin Ming Ooi</div>
            </div>

            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/edbaa66f-c24c-4d32-a522-775b5beee7a9/c588b5f8-012c-47e9-92b2-3452195dd42b.jpg" alt="Victor Ngow" class="tutor-photo">
                <div class="tutor-name">Victor Ngow</div>
            </div>

            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/0158fbbf-7611-4e61-b802-83c907045541/870c5753-e1a5-413c-abe6-3cdb50797fad.jpg" alt="Sabrina Azizulezly" class="tutor-photo">
                <div class="tutor-name">Sabrina Azizulezly</div>
            </div>

            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/d54917a6-8b13-4b51-a1f3-1ffaea618931/dfc45621-6426-4fe7-9cbe-aff85d7009f2.jpg" alt="Cheng Yu Lin" class="tutor-photo">
                <div class="tutor-name">Cheng Yu Lin</div>
            </div>

            <div class="tutor-item">
                <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/7b7a63f9-030f-4326-b15a-7a6538495631/c4578e5f-3e10-4a3a-aae6-3e2bb79382e1.jpg" alt="Sadhana Saravanan" class="tutor-photo">
                <div class="tutor-name">Sadhana Saravanan</div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = (e.clientX - 24) + 'px';
            cursor.style.top = (e.clientY - 24) + 'px';
        });
    </script>
</body>
</html>
