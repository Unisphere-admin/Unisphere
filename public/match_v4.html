<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tutor Carousel with Profile Pop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-track {
            position: relative;
            width: 900px;
            height: 150px;
            overflow: hidden;
            border-radius: 12px;
        }

        .carousel-items {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            animation: scroll 12s linear infinite;
            width: fit-content;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-1100px);
            }
        }

        .carousel-items.paused {
            animation: none;
        }

        .carousel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .carousel-item:hover .carousel-photo {
            transform: scale(1.05);
        }

        .carousel-photo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .carousel-name {
            font-size: 11px;
            color: #666;
            font-weight: 500;
            text-align: center;
            max-width: 70px;
        }

        /* Profile card popup */
        .profile-card {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 120px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 16px;
            padding: 12px;
            z-index: 100;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .profile-card.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px 0;
        }

        .profile-name {
            font-weight: 600;
            color: #222;
            font-size: 14px;
        }

        .profile-uni {
            font-size: 12px;
            color: #666;
        }

        .profile-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .profile-tag {
            background: #f0f0f0;
            color: #666;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
        }

        /* Cursor styling */
        .cursor {
            position: fixed;
            width: 48px;
            height: 48px;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .click-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid #0d9488;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
        }

        .click-ring.active {
            animation: ringPulse 0.6s ease forwards;
        }

        @keyframes ringPulse {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.8);
            }
        }
    </style>
</head>
<body>
    <div class="cursor">
        <svg viewBox="0 0 24 24" fill="white" stroke="#222" stroke-width="1.2">
            <path d="M4 2l16 10-7 1-4 7z"/>
        </svg>
    </div>

    <div class="click-ring"></div>

    <div class="container">
        <div class="carousel-track">
            <div class="carousel-items" id="carouselItems">
                <div class="carousel-item" data-name="Scott Hong" data-uni="Cambridge · Economics" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/233eec2a-5857-42bd-ae1b-26666175b68e/bbbcf803-f809-4899-b652-8b8e579982a4.jpeg" data-subject1="Economics" data-subject2="Oxbridge">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/233eec2a-5857-42bd-ae1b-26666175b68e/bbbcf803-f809-4899-b652-8b8e579982a4.jpeg" alt="Scott Hong" class="carousel-photo">
                    <div class="carousel-name">Scott Hong</div>
                </div>

                <div class="carousel-item" data-name="Jin Ming Ooi" data-uni="Oxford · Personal Statement" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/f223d50a-498c-4c7c-b740-052463f673aa/141176b4-f633-4d68-af69-4ae479428cc9.jpg" data-subject1="Personal Statement" data-subject2="Oxbridge">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/f223d50a-498c-4c7c-b740-052463f673aa/141176b4-f633-4d68-af69-4ae479428cc9.jpg" alt="Jin Ming Ooi" class="carousel-photo">
                    <div class="carousel-name">Jin Ming Ooi</div>
                </div>

                <div class="carousel-item" data-name="Victor Ngow" data-uni="LSE · Finance" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/edbaa66f-c24c-4d32-a522-775b5beee7a9/c588b5f8-012c-47e9-92b2-3452195dd42b.jpg" data-subject1="Finance" data-subject2="Economics">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/edbaa66f-c24c-4d32-a522-775b5beee7a9/c588b5f8-012c-47e9-92b2-3452195dd42b.jpg" alt="Victor Ngow" class="carousel-photo">
                    <div class="carousel-name">Victor Ngow</div>
                </div>

                <div class="carousel-item" data-name="Sabrina Azizulezly" data-uni="Yale · Pre-Med" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/0158fbbf-7611-4e61-b802-83c907045541/870c5753-e1a5-413c-abe6-3cdb50797fad.jpg" data-subject1="Pre-Med" data-subject2="Biology">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/0158fbbf-7611-4e61-b802-83c907045541/870c5753-e1a5-413c-abe6-3cdb50797fad.jpg" alt="Sabrina Azizulezly" class="carousel-photo">
                    <div class="carousel-name">Sabrina Azizulezly</div>
                </div>

                <div class="carousel-item" data-name="Cheng Yu Lin" data-uni="Imperial · Engineering" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/d54917a6-8b13-4b51-a1f3-1ffaea618931/dfc45621-6426-4fe7-9cbe-aff85d7009f2.jpg" data-subject1="Engineering" data-subject2="Physics">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/d54917a6-8b13-4b51-a1f3-1ffaea618931/dfc45621-6426-4fe7-9cbe-aff85d7009f2.jpg" alt="Cheng Yu Lin" class="carousel-photo">
                    <div class="carousel-name">Cheng Yu Lin</div>
                </div>

                <div class="carousel-item" data-name="Sadhana Saravanan" data-uni="UCL · Law" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/7b7a63f9-030f-4326-b15a-7a6538495631/c4578e5f-3e10-4a3a-aae6-3e2bb79382e1.jpg" data-subject1="Law" data-subject2="Politics">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/7b7a63f9-030f-4326-b15a-7a6538495631/c4578e5f-3e10-4a3a-aae6-3e2bb79382e1.jpg" alt="Sadhana Saravanan" class="carousel-photo">
                    <div class="carousel-name">Sadhana Saravanan</div>
                </div>

                <!-- Duplicate for seamless loop -->
                <div class="carousel-item" data-name="Scott Hong" data-uni="Cambridge · Economics" data-image="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/233eec2a-5857-42bd-ae1b-26666175b68e/bbbcf803-f809-4899-b652-8b8e579982a4.jpeg" data-subject1="Economics" data-subject2="Oxbridge">
                    <img src="https://wtsekxjhqvwnpexnszwl.supabase.co/storage/v1/object/public/avatars/233eec2a-5857-42bd-ae1b-26666175b68e/bbbcf803-f809-4899-b652-8b8e579982a4.jpeg" alt="Scott Hong" class="carousel-photo">
                    <div class="carousel-name">Scott Hong</div>
                </div>
            </div>
        </div>
    </div>

    <div class="profile-card" id="profileCard">
        <img src="" alt="" class="profile-photo" id="profilePhoto">
        <div class="profile-info">
            <div>
                <div class="profile-name" id="profileName"></div>
                <div class="profile-uni" id="profileUni"></div>
            </div>
            <div class="profile-tags">
                <div class="profile-tag" id="tag1"></div>
                <div class="profile-tag" id="tag2"></div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        const carouselItems = document.querySelectorAll('.carousel-item');
        const profileCard = document.getElementById('profileCard');
        const carouselTrack = document.getElementById('carouselItems');
        let isCardOpen = false;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = (e.clientX - 24) + 'px';
            cursor.style.top = (e.clientY - 24) + 'px';
        });

        // Simulate animation loop with click interaction
        let cycleCount = 0;

        function simulateCarouselCycle() {
            if (isCardOpen) return;

            cycleCount++;
            const clickIndex = 2; // Click on third tutor (Jin Ming)

            // Pause carousel
            carouselTrack.classList.add('paused');

            // Simulate click on tutor at index
            setTimeout(() => {
                const item = carouselItems[clickIndex];
                openProfileCard(item);
            }, 300);

            // Resume carousel after 1.5s
            setTimeout(() => {
                profileCard.classList.remove('active');
                isCardOpen = false;
                carouselTrack.classList.remove('paused');

                // Schedule next cycle
                setTimeout(simulateCarouselCycle, 4000);
            }, 1800);
        }

        function openProfileCard(item) {
            const name = item.getAttribute('data-name');
            const uni = item.getAttribute('data-uni');
            const image = item.getAttribute('data-image');
            const subject1 = item.getAttribute('data-subject1');
            const subject2 = item.getAttribute('data-subject2');

            document.getElementById('profileName').textContent = name;
            document.getElementById('profileUni').textContent = uni;
            document.getElementById('profilePhoto').src = image;
            document.getElementById('profilePhoto').alt = name;
            document.getElementById('tag1').textContent = subject1;
            document.getElementById('tag2').textContent = subject2;

            profileCard.classList.add('active');
            isCardOpen = true;
        }

        // Add click listeners for manual interaction
        carouselItems.forEach((item) => {
            item.addEventListener('click', () => {
                if (!isCardOpen) {
                    carouselTrack.classList.add('paused');
                    openProfileCard(item);

                    setTimeout(() => {
                        profileCard.classList.remove('active');
                        isCardOpen = false;
                        carouselTrack.classList.remove('paused');
                    }, 1800);
                }
            });
        });

        // Start the carousel animation loop
        simulateCarouselCycle();
    </script>
</body>
</html>
