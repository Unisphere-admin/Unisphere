<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Bubbles Visual</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .container {
    position: relative;
    width: 620px;
    height: 380px;
  }
  .bubble {
    position: absolute;
    padding: 14px 26px;
    border-radius: 50px;
    background: #f3f4f6;
    color: #374151;
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    cursor: default;
    user-select: none;
    border: 2px solid transparent;
  }
  .bubble.selected {
    background: #0d9488;
    color: #fff;
    border-color: #0d9488;
    transform: scale(1.08);
    box-shadow: 0 4px 20px rgba(13,148,136,0.3);
  }
  .bubble .checkmark {
    display: inline-block;
    margin-left: 8px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .bubble.selected .checkmark {
    opacity: 1;
    transform: scale(1);
  }
  .cursor {
    position: absolute;
    width: 48px;
    height: 48px;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: none;
  }
  .cursor svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.25));
  }
  .click-ring {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid #0d9488;
    pointer-events: none;
    z-index: 99;
    opacity: 0;
  }
  .ring-animate {
    animation: ringPulse 0.35s ease-out forwards;
  }
  @keyframes ringPulse {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.3); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.8); }
  }
</style>
</head>
<body>
<div class="container" id="container">
  <!-- Bubbles positioned in a nice scattered layout -->
  <div class="bubble" id="b0" style="left: 30px; top: 30px;">Personal Statement<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b1" style="left: 280px; top: 20px;">Oxbridge Interviews<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b2" style="left: 60px; top: 110px;">A-Levels<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b3" style="left: 210px; top: 105px;">IGCSE<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b4" style="left: 340px; top: 100px;">Extracurricular Building<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b5" style="left: 100px; top: 195px;">SAT<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b6" style="left: 220px; top: 190px;">ACT<span class="checkmark">&#10003;</span></div>
  <div class="bubble" id="b7" style="left: 340px; top: 195px;">Admissions Tests<span class="checkmark">&#10003;</span></div>

  <!-- Cursor -->
  <div class="cursor" id="cursor">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86a.5.5 0 0 1 .35-.15h6.87a.5.5 0 0 0 .35-.85L6.35 2.86a.5.5 0 0 0-.85.35Z" fill="#000" stroke="#fff" stroke-width="1"/>
    </svg>
  </div>

  <!-- Click ring -->
  <div class="click-ring" id="ring"></div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('ring');
const bubbles = [
  document.getElementById('b0'),
  document.getElementById('b1'),
  document.getElementById('b2'),
  document.getElementById('b3'),
  document.getElementById('b4'),
  document.getElementById('b5'),
  document.getElementById('b6'),
  document.getElementById('b7')
];

// Which bubbles the cursor will click (indices): Personal Statement, A-Levels, Admissions Tests
const clickTargets = [0, 2, 7];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function moveCursor(x, y, duration) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1)`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, duration);
  });
}

function clickAt(x, y) {
  ring.className = 'click-ring';
  ring.style.left = x + 'px';
  ring.style.top = y + 'px';
  void ring.offsetWidth;
  ring.className = 'click-ring ring-animate';
}

async function animate() {
  // Reset
  bubbles.forEach(b => b.classList.remove('selected'));
  cursor.style.opacity = '0';
  cursor.style.transition = 'none';
  cursor.style.left = '300px';
  cursor.style.top = '300px';

  await sleep(400);

  // Fade cursor in
  cursor.style.transition = 'opacity 0.3s';
  cursor.style.opacity = '1';
  await sleep(350);

  for (let i = 0; i < clickTargets.length; i++) {
    const idx = clickTargets[i];
    const bubble = bubbles[idx];
    const rect = bubble.getBoundingClientRect();
    const containerRect = document.getElementById('container').getBoundingClientRect();
    const targetX = rect.left - containerRect.left + rect.width / 2;
    const targetY = rect.top - containerRect.top + rect.height / 2;

    await moveCursor(targetX, targetY, 450);
    await sleep(120);
    clickAt(targetX, targetY);
    await sleep(80);
    bubble.classList.add('selected');
    await sleep(500);
  }

  // Pause at end
  await sleep(1500);

  // Fade cursor out
  cursor.style.transition = 'opacity 0.3s';
  cursor.style.opacity = '0';
  await sleep(400);

  // Reset and loop
  await sleep(600);
  bubbles.forEach(b => b.classList.remove('selected'));
  animate();
}

animate();
</script>
</body>
</html>
